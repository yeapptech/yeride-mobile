appId: app.yeride.dev
# Ensure the app is signed in as a specific account. env: EMAIL, PASSWORD
#
# clearKeychain clears the Firebase auth token so the app always starts on
# "Welcome back" — no stale session, no sign-out step needed.  It also
# prevents iOS from showing the QuickType/autofill suggestion bar (no saved
# credentials to suggest), which otherwise shifts the layout so a
# tapOn:id:login-password-input lands on "Forgot password?" instead of the
# field.
---
- launchApp:
    clearKeychain: true
- tapOn:
    text: 'Continue'
    optional: true
- tapOn:
    text: 'Got it'
    optional: true
- tapOn:
    text: 'Not now'
    optional: true
- waitForAnimationToEnd
# Dismiss the Expo developer menu if it appeared on startup (tap the app
# backdrop above the menu sheet to close it).
- runFlow:
    when:
      visible: 'Reload'
    commands:
      - tapOn:
          point: '50%,10%'
      - waitForAnimationToEnd
# Now on "Welcome back" — sign in with the requested creds.
# Use testIDs (login-email-input / login-password-input) so the tap targets
# are unambiguous regardless of keyboard / layout state.
- assertVisible: 'Welcome back'
- tapOn:
    id: login-email-input
- eraseText
- inputText: ${EMAIL}
- tapOn:
    id: login-password-input
- eraseText
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn: 'Sign in'
- extendedWaitUntil:
    notVisible: 'Welcome back'
    timeout: 20000
- tapOn:
    text: 'Not now'
    optional: true
- waitForAnimationToEnd
