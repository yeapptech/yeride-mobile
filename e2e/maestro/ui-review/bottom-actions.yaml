appId: app.yeride.dev
# Asserts sticky bottom buttons are visible and not obscured by the home indicator.
# Covers: RouteSearchScreen (route-search-continue).
#
# NOTE: AddPaymentMethodScreen's add-pm-save button cannot be tested here
# because the Expo dev-client gear button (always visible, top-right) sits at
# the same accessibility position as wallet-header-add, intercepting every tap.
# This is a dev-build-only limitation; the static audit still flags the missing
# safe-area inset on AddPaymentMethodScreen independently.
#
# Prerequisite: RIDER_EMAIL / RIDER_PASSWORD env vars.
---
- runFlow:
    file: ../_lib/sign-in-as.yaml
    env:
      EMAIL: ${RIDER_EMAIL}
      PASSWORD: ${RIDER_PASSWORD}
- runFlow: ../auth/dismiss-soft-asks.yaml
# Navigate to RouteSearch
- tapOn:
    id: rider-home-where-to
- waitForAnimationToEnd
# RouteSearch: assert the Continue button is visible at the bottom
# (not clipped by the home indicator — SafeAreaView uses edges=['top'] only).
- assertVisible:
    id: route-search-continue
- back
