appId: app.yeride.dev
# Scrolls each long-content screen and asserts no crash / content not cut off.
# Covers: ActivityScreen (rider+driver), WalletScreen, DriverEarningsScreen.
# Prerequisite: RIDER_EMAIL / RIDER_PASSWORD / DRIVER_EMAIL / DRIVER_PASSWORD env vars.
---
# ── Rider: Activity tab ──────────────────────────────────────────────────────
- runFlow:
    file: ../_lib/sign-in-as.yaml
    env:
      EMAIL: ${RIDER_EMAIL}
      PASSWORD: ${RIDER_PASSWORD}
- runFlow: ../auth/dismiss-soft-asks.yaml
- runFlow:
    file: ../_lib/tap-tab.yaml
    env:
      TAB_TEXT: 'Activity'
      TAB_POINT: '37%,96%'
- extendedWaitUntil:
    notVisible:
      id: activity-loading
    timeout: 8000
    optional: true
- scroll
- scroll
- assertVisible:
    id: activity-screen
# ── Rider: Wallet tab ────────────────────────────────────────────────────────
- runFlow:
    file: ../_lib/tap-tab.yaml
    env:
      TAB_TEXT: 'Wallet'
      TAB_POINT: '62%,96%'
- extendedWaitUntil:
    notVisible:
      id: wallet-loading-spinner
    timeout: 8000
    optional: true
- scroll
# Verify wallet rendered successfully: header-add (ready) or empty-add (no cards).
# runFlow-when acts as OR: if header-add absent, assert empty-add (which must be there).
- runFlow:
    when:
      notVisible:
        id: wallet-header-add
    commands:
      - assertVisible:
          id: wallet-empty-add
# ── Switch to driver account ─────────────────────────────────────────────────
- runFlow:
    file: ../_lib/sign-in-as.yaml
    env:
      EMAIL: ${DRIVER_EMAIL}
      PASSWORD: ${DRIVER_PASSWORD}
- runFlow: ../auth/dismiss-soft-asks.yaml
# ── Driver: Activity tab ─────────────────────────────────────────────────────
- runFlow:
    file: ../_lib/tap-tab.yaml
    env:
      TAB_TEXT: 'Activity'
      TAB_POINT: '37%,96%'
- extendedWaitUntil:
    notVisible:
      id: driver-activity-loading
    timeout: 8000
    optional: true
- scroll
- scroll
- assertVisible:
    id: driver-activity-screen
# ── Driver: Earnings tab ─────────────────────────────────────────────────────
- runFlow:
    file: ../_lib/tap-tab.yaml
    env:
      TAB_TEXT: 'Earnings'
      TAB_POINT: '62%,96%'
- extendedWaitUntil:
    notVisible:
      id: earnings-loading-spinner
    timeout: 10000
    optional: true
- scroll
# Verify earnings rendered: balance-card (enabled), continue-setup (pending), or setup-payouts (no_account).
- runFlow:
    when:
      notVisible:
        id: earnings-balance-card
    commands:
      - runFlow:
          when:
            notVisible:
              id: earnings-continue-setup
          commands:
            - assertVisible:
                id: earnings-setup-payouts
